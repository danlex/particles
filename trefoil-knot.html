  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 28px;
      z-index: 10;
      align-items: center;
    }
    .ctrl-group {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .ctrl-group label {
      color: rgba(255,255,255,0.4); font-size: 9px;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .ctrl-group input[type="range"] {
      -webkit-appearance: none; width: 100px; height: 3px;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    #info {
      position: fixed; top: 24px; left: 28px; z-index: 10;
    }
    #info h1 {
      color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 400;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #info p {
      color: rgba(255,255,255,0.25); font-size: 10px;
      margin-top: 6px; letter-spacing: 1px;
    }
    #fps {
      position: fixed; top: 24px; right: 28px;
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 1px; z-index: 10;
    }
    #back {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10;
    }
    #back a {
      color: rgba(255,255,255,0.2); font-size: 9px; text-decoration: none;
      letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.3s;
    }
    #back a:hover { color: rgba(255,255,255,0.5); }
      .zoom-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      font-family: monospace;
    }
    .zoom-btn:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div id="info">
    <h1>Trefoil Knot</h1>
    <p id="particle-count"></p>
  </div>
  <div id="fps"></div>
  <div id="back"><a href="index.html">Gallery</a></div>
  <div id="controls">
    <div class="ctrl-group">
      <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
      <label>Speed</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="bloom" min="0" max="3" step="0.1" value="0.4">
      <label>Bloom</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="size" min="0.5" max="4" step="0.1" value="1.0">
      <label>Size</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="hueShift" min="0" max="1" step="0.01" value="0">
      <label>Hue</label>
    </div>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn" id="zoomIn">+</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

    const WIDTH = 256;
    const PARTICLE_COUNT = WIDTH * WIDTH;

    // Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 3, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(1);
    document.body.appendChild(renderer.domElement);

    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.05;
    orbitControls.autoRotate = true;
    orbitControls.autoRotateSpeed = 0.5;

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(innerWidth / 2, innerHeight / 2),
      0.4, 0.3, 0.85
    );
    composer.addPass(bloomPass);

    // GPU Computation
    const gpuCompute = new GPUComputationRenderer(WIDTH, WIDTH, renderer);
    const posTex0 = gpuCompute.createTexture();

    function seedTexture(tex) {
      const data = tex.image.data;
      const PI = Math.PI;
      const golden = 1.6180339887;
      const R = 4.0;
      const r = 1.2;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const idx = i * 4;

        // Distribute particles using golden ratio for uniform coverage
        const u = (i * golden % 1.0) * 2.0 * PI;
        const v = (i * golden * golden % 1.0) * 2.0 * PI;

        // Trefoil knot center curve
        const cx = 0.3 * R * (Math.sin(u) + 2.0 * Math.sin(2.0 * u));
        const cy = 0.3 * R * (Math.cos(u) - 2.0 * Math.cos(2.0 * u));
        const cz = 0.3 * R * (-Math.sin(3.0 * u)) * 0.8;

        // Compute tangent via finite difference
        const du = 0.001;
        const cx2 = 0.3 * R * (Math.sin(u + du) + 2.0 * Math.sin(2.0 * (u + du)));
        const cy2 = 0.3 * R * (Math.cos(u + du) - 2.0 * Math.cos(2.0 * (u + du)));
        const cz2 = 0.3 * R * (-Math.sin(3.0 * (u + du))) * 0.8;

        let tx = cx2 - cx, ty = cy2 - cy, tz = cz2 - cz;
        const tLen = Math.sqrt(tx * tx + ty * ty + tz * tz);
        tx /= tLen; ty /= tLen; tz /= tLen;

        // Normal and binormal (Frenet frame)
        let nx = ty * 0.0 - tz * 1.0;
        let ny = tz * 0.0 - tx * 0.0;
        let nz = tx * 1.0 - ty * 0.0;
        // cross(T, up) where up = (0,1,0)
        nx = tz * 0.0 - ty * 0.0;  // Tz*0 - Ty*0... let me redo
        // cross(T, (0,1,0)) = (Tz*1 - 0, 0 - Tx*0... no
        // T x up = (Ty*0 - Tz*1, Tz*0 - Tx*0, Tx*1 - Ty*0) = (-Tz, 0, Tx)
        nx = -tz;
        ny = 0;
        nz = tx;
        const nLen = Math.sqrt(nx * nx + ny * ny + nz * nz);
        if (nLen > 0.0001) { nx /= nLen; ny /= nLen; nz /= nLen; }

        // Binormal = T x N
        const bx = ty * nz - tz * ny;
        const by = tz * nx - tx * nz;
        const bz = tx * ny - ty * nx;

        // Tube cross-section
        const tubeR = r * (0.3 + 0.7 * ((i * 0.000137) % 1.0));
        const px = cx + tubeR * (nx * Math.cos(v) + bx * Math.sin(v));
        const py = cy + tubeR * (ny * Math.cos(v) + by * Math.sin(v));
        const pz = cz + tubeR * (nz * Math.cos(v) + bz * Math.sin(v));

        const speed = (u / (2.0 * PI)) % 1.0;

        data[idx]     = px;
        data[idx + 1] = py;
        data[idx + 2] = pz;
        data[idx + 3] = speed;
      }
    }

    seedTexture(posTex0);

    const positionShader = `
      uniform float uTime;
      uniform float uSpeed;
      uniform vec3 uMouse;
      uniform float uMouseActive;

      #define PI 3.14159265359

      void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        float idx = gl_FragCoord.y * resolution.x + gl_FragCoord.x;
        float total = resolution.x * resolution.y;
        float golden = 1.6180339887;

        // Each particle: position along the knot (u) + tube cross-section (v, w)
        float u = fract(idx * golden) * 2.0 * PI;
        float v = fract(idx * golden * golden) * 2.0 * PI;

        // Animate: particles flow along the knot
        u += uTime * 0.5 * uSpeed;

        // Trefoil knot parametric equations
        float R = 4.0;
        float r = 1.2;

        // Knot center curve: trefoil
        float cx = R * (sin(u) + 2.0 * sin(2.0 * u));
        float cy = R * (cos(u) - 2.0 * cos(2.0 * u));
        float cz = R * (-sin(3.0 * u)) * 0.8;

        // Scale down
        cx *= 0.3; cy *= 0.3; cz *= 0.3;

        // Compute tangent, normal, binormal (Frenet frame)
        float du = 0.001;
        float cx2 = 0.3 * R * (sin(u+du) + 2.0 * sin(2.0*(u+du)));
        float cy2 = 0.3 * R * (cos(u+du) - 2.0 * cos(2.0*(u+du)));
        float cz2 = 0.3 * R * (-sin(3.0*(u+du))) * 0.8;

        vec3 T = normalize(vec3(cx2-cx, cy2-cy, cz2-cz));
        vec3 up = vec3(0.0, 1.0, 0.0);
        vec3 N = normalize(cross(T, up));
        vec3 B = cross(T, N);

        // Tube cross-section position
        float tubeR = r * (0.3 + 0.7 * fract(idx * 0.000137));
        float px = cx + tubeR * (N.x * cos(v) + B.x * sin(v));
        float py = cy + tubeR * (N.y * cos(v) + B.y * sin(v));
        float pz = cz + tubeR * (N.z * cos(v) + B.z * sin(v));

        // Mouse attraction
        if (uMouseActive > 0.01) {
          vec3 pos = vec3(px, py, pz);
          vec3 toMouse = uMouse - pos;
          float mouseDist = length(toMouse);
          float mouseForce = uMouseActive * 0.3 / (mouseDist * mouseDist + 1.0);
          px += toMouse.x * mouseForce * 0.016;
          py += toMouse.y * mouseForce * 0.016;
          pz += toMouse.z * mouseForce * 0.016;
        }

        float speed = fract(u / (2.0 * PI));
        gl_FragColor = vec4(px, py, pz, speed);
      }
    `;

    const posVar = gpuCompute.addVariable('texturePosition', positionShader, posTex0);
    gpuCompute.setVariableDependencies(posVar, [posVar]);

    posVar.material.uniforms.uTime = { value: 0.0 };
    posVar.material.uniforms.uSpeed = { value: 1.0 };
    posVar.material.uniforms.uMouse = { value: new THREE.Vector3(0, 0, -1000) };
    posVar.material.uniforms.uMouseActive = { value: 0.0 };

    posVar.wrapS = THREE.RepeatWrapping;
    posVar.wrapT = THREE.RepeatWrapping;

    const err = gpuCompute.init();
    if (err !== null) console.error('GPU Computation init error:', err);

    // Particle Rendering
    const vertexShader = `
      uniform sampler2D uPositionTexture;
      uniform float uHueShift;
      uniform float uPointSize;
      uniform float uScale;
      uniform vec3 uMouseWorld;
      attribute vec2 aTexCoord;
      varying vec3 vColor;

      vec3 hsl2rgb(float h, float s, float l) {
        float c = (1.0 - abs(2.0 * l - 1.0)) * s;
        float h6 = h * 6.0;
        float x = c * (1.0 - abs(mod(h6, 2.0) - 1.0));
        float m = l - c * 0.5;
        vec3 rgb;
        if (h6 < 1.0) rgb = vec3(c, x, 0.0);
        else if (h6 < 2.0) rgb = vec3(x, c, 0.0);
        else if (h6 < 3.0) rgb = vec3(0.0, c, x);
        else if (h6 < 4.0) rgb = vec3(0.0, x, c);
        else if (h6 < 5.0) rgb = vec3(x, 0.0, c);
        else rgb = vec3(c, 0.0, x);
        return rgb + m;
      }

      void main() {
        vec4 posData = texture2D(uPositionTexture, aTexCoord);
        float x = posData.x;
        float y = posData.y;
        float z = posData.z;
        float speed = posData.w;

        vec3 pos = vec3(x, y, z) * uScale;

        // Mouse displacement
        vec3 toMouse = uMouseWorld - pos;
        float mouseDist = length(toMouse);
        pos += toMouse * 0.02 / (mouseDist * mouseDist + 4.0);

        // Color: position along knot (w) for rainbow, tube variation
        float hue = fract(speed + uHueShift);
        float saturation = 0.85;
        float lightness = 0.12 + speed * 0.08;

        vColor = hsl2rgb(hue, saturation, lightness);

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = uPointSize * (55.0 / -mvPosition.z);
        gl_PointSize = max(gl_PointSize, 0.3);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        // Soft gaussian falloff with bright core
        float glow = exp(-d * d * 3.0);
        float core = exp(-d * d * 12.0);
        float alpha = (glow * 0.15 + core * 0.3);
        // Slight color boost at core (hotter center)
        vec3 col = vColor + core * 0.15;
        gl_FragColor = vec4(col, alpha);
      }
    `;

    const geometry = new THREE.BufferGeometry();
    const texCoords = new Float32Array(PARTICLE_COUNT * 2);
    for (let j = 0; j < WIDTH; j++) {
      for (let i = 0; i < WIDTH; i++) {
        const idx = (j * WIDTH + i) * 2;
        texCoords[idx]     = (i + 0.5) / WIDTH;
        texCoords[idx + 1] = (j + 0.5) / WIDTH;
      }
    }
    const dummyPositions = new Float32Array(PARTICLE_COUNT * 3);
    geometry.setAttribute('position', new THREE.BufferAttribute(dummyPositions, 3));
    geometry.setAttribute('aTexCoord', new THREE.BufferAttribute(texCoords, 2));

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uPositionTexture: { value: null },
        uHueShift: { value: 0.0 },
        uPointSize: { value: 1.5 },
        uScale: { value: 1.5 },
        uMouseWorld: { value: new THREE.Vector3(0, 0, -1000) },
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const points = new THREE.Points(geometry, material);
    const pivot = new THREE.Group(); pivot.add(points); scene.add(pivot);

    // UI
    document.getElementById('particle-count').textContent =
      `${PARTICLE_COUNT.toLocaleString()} particles — fully GPU computed`;

    const speedSlider = document.getElementById('speed');
    const bloomSlider = document.getElementById('bloom');
    const sizeSlider = document.getElementById('size');
    const hueSlider = document.getElementById('hueShift');
    const fpsEl = document.getElementById('fps');

    document.getElementById('zoomIn').addEventListener('click', () => {
      material.uniforms.uScale.value *= 1.15;
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      material.uniforms.uScale.value *= 0.85;
    });

    // Animation Loop
    // Mouse interaction
    const mouse = new THREE.Vector2();
    const mouse3D = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    let mouseActive = false;

    renderer.domElement.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      mouseActive = true;
      raycaster.setFromCamera(mouse, camera);
      mouse3D.copy(raycaster.ray.direction).multiplyScalar(15).add(camera.position);
    });
    renderer.domElement.addEventListener('mouseleave', () => { mouseActive = false; });

    let lastTime = performance.now();
    let frameCount = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      frameCount++;
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `${frameCount} FPS`;
        frameCount = 0;
        lastTime = now;
      }

      posVar.material.uniforms.uSpeed.value = parseFloat(speedSlider.value);
      posVar.material.uniforms.uTime.value += 0.016;
      bloomPass.strength = parseFloat(bloomSlider.value);
      material.uniforms.uHueShift.value = parseFloat(hueSlider.value);
      material.uniforms.uPointSize.value = parseFloat(sizeSlider.value);

      // Update mouse uniforms
      if (mouseActive) {
        posVar.material.uniforms.uMouse.value.copy(mouse3D);
        posVar.material.uniforms.uMouseActive.value = 1.0;
        material.uniforms.uMouseWorld.value.copy(mouse3D);
      } else {
        posVar.material.uniforms.uMouseActive.value *= 0.95;
      }


      gpuCompute.compute();

      material.uniforms.uPositionTexture.value =
        gpuCompute.getCurrentRenderTarget(posVar).texture;

      pivot.rotation.x += 0.0008;
      orbitControls.update();
      composer.render();
    }

    animate(performance.now());

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
<script src="shared-ui.js"></script>
</body>
</html>
