<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torus Knot — Particles</title>
  <meta name="description" content="Particles flowing along a (3,7) torus knot. Complex parametric curve wrapping a torus.">
  <meta name="author" content="Alexandru DAN">
  <meta name="theme-color" content="#050505">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

  <meta property="og:title" content="Torus Knot — Particles">
  <meta property="og:description" content="Particles flowing along a (3,7) torus knot. Complex parametric curve wrapping a torus.">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 28px;
      z-index: 10;
      align-items: center;
    }
    .ctrl-group {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .ctrl-group label {
      color: rgba(255,255,255,0.4); font-size: 9px;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .ctrl-group input[type="range"] {
      -webkit-appearance: none; width: 100px; height: 3px;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    #info {
      position: fixed; top: 24px; left: 28px; z-index: 10;
    }
    #info h1 {
      color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 400;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #info p {
      color: rgba(255,255,255,0.25); font-size: 10px;
      margin-top: 6px; letter-spacing: 1px;
    }
    #fps {
      position: fixed; top: 24px; right: 28px;
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 1px; z-index: 10;
    }
      .zoom-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      font-family: monospace;
    }
    .zoom-btn:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div id="info">
    <h1>Torus Knot</h1>
    <p id="particle-count"></p>
  </div>
  <div id="fps"></div>
  <div id="controls">
    <div class="ctrl-group">
      <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
      <label>Speed</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="bloom" min="0" max="3" step="0.1" value="0.3">
      <label>Bloom</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="size" min="0.5" max="4" step="0.1" value="0.8">
      <label>Size</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="hueShift" min="0" max="1" step="0.01" value="0">
      <label>Hue</label>
    </div>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn" id="zoomIn">+</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

    // =============================================
    // CONFIG
    // =============================================
    const WIDTH = 256; // 256x256 = 65,536 particles
    const PARTICLE_COUNT = WIDTH * WIDTH;
    const PI2 = Math.PI * 2;

    // Torus knot parameters
    const R = 2.0, r = 0.8, P = 3, Q = 7;

    // =============================================
    // SCENE
    // =============================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(1);
    document.body.appendChild(renderer.domElement);

    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.05;
    orbitControls.autoRotate = true;
    orbitControls.autoRotateSpeed = 0.5;

    // =============================================
    // POST-PROCESSING
    // =============================================
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(innerWidth / 2, innerHeight / 2),
      0.3,  // strength
      0.2,  // radius
      0.85  // threshold
    );
    composer.addPass(bloomPass);

    // =============================================
    // GPU COMPUTATION (Torus Knot on GPU)
    // =============================================
    const gpuCompute = new GPUComputationRenderer(WIDTH, WIDTH, renderer);

    // Position texture: stores (x, y, z, t) per particle
    // .w = t parameter along the curve
    const posTex0 = gpuCompute.createTexture();

    // Seed particles along the torus knot curve
    function seedTexture(tex) {
      const data = tex.image.data;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const idx = i * 4;

        // Distribute t evenly along the curve, with slight random jitter
        const t = (i / PARTICLE_COUNT) * PI2 + (Math.random() - 0.5) * 0.01;

        // Compute point on the torus knot
        const cosQt = Math.cos(Q * t);
        const sinQt = Math.sin(Q * t);
        const cosPt = Math.cos(P * t);
        const sinPt = Math.sin(P * t);

        const ringR = R + r * cosQt;
        let x = ringR * cosPt;
        let y = ringR * sinPt;
        let z = r * sinQt;

        // Compute tangent for perpendicular offset direction
        const dt = 0.001;
        const t2 = t + dt;
        const cosQt2 = Math.cos(Q * t2);
        const sinQt2 = Math.sin(Q * t2);
        const cosPt2 = Math.cos(P * t2);
        const sinPt2 = Math.sin(P * t2);
        const ringR2 = R + r * cosQt2;
        const tx = ringR2 * cosPt2 - x;
        const ty = ringR2 * sinPt2 - y;
        const tz = r * sinQt2 - z;
        const tLen = Math.sqrt(tx*tx + ty*ty + tz*tz) + 1e-6;
        const tnx = tx / tLen, tny = ty / tLen, tnz = tz / tLen;

        // Two perpendicular vectors using cross products
        // Cross tangent with up vector (0,1,0) or (1,0,0)
        let ux, uy, uz;
        if (Math.abs(tny) < 0.99) {
          ux = tnz; uy = 0; uz = -tnx; // tangent cross (0,1,0)
        } else {
          ux = 0; uy = -tnz; uz = tny; // tangent cross (1,0,0)
        }
        const uLen = Math.sqrt(ux*ux + uy*uy + uz*uz) + 1e-6;
        ux /= uLen; uy /= uLen; uz /= uLen;

        // Second perpendicular: tangent cross u
        const vx = tny*uz - tnz*uy;
        const vy = tnz*ux - tnx*uz;
        const vz = tnx*uy - tny*ux;

        // Random offset perpendicular to curve for thickness
        const angle = Math.random() * PI2;
        const radius = Math.random() * 0.15;
        const offX = (ux * Math.cos(angle) + vx * Math.sin(angle)) * radius;
        const offY = (uy * Math.cos(angle) + vy * Math.sin(angle)) * radius;
        const offZ = (uz * Math.cos(angle) + vz * Math.sin(angle)) * radius;

        data[idx]     = x + offX;
        data[idx + 1] = y + offY;
        data[idx + 2] = z + offZ;
        data[idx + 3] = t; // store t parameter in .w
      }
    }

    seedTexture(posTex0);

    // GPU shader: Torus knot flow computed entirely on GPU
    const positionShader = `
      uniform float uDt;
      uniform float uSpeed;
      uniform float uFrame;

      #define PI2 6.28318530718
      #define R 2.0
      #define r 0.8
      #define P 3.0
      #define Q 7.0

      // Hash-based noise for GPU
      float hash(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }

      float noise(vec2 p) {
        return hash(p) * 2.0 - 1.0;
      }

      // Smooth noise using bilinear interpolation
      float smoothNoise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y) * 2.0 - 1.0;
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 pos = texture2D(texturePosition, uv);

        float t = pos.w;

        // Increment t to flow along the curve
        float dt = uDt * uSpeed;
        t += dt;

        // Wrap t into [0, 2*PI)
        t = mod(t, PI2);

        // Compute torus knot position
        float cosQt = cos(Q * t);
        float sinQt = sin(Q * t);
        float cosPt = cos(P * t);
        float sinPt = sin(P * t);

        float ringR = R + r * cosQt;
        float x = ringR * cosPt;
        float y = ringR * sinPt;
        float z = r * sinQt;

        // Compute tangent vector (derivative of the parametric curve)
        float dxdt = -Q * r * sinQt * cosPt - P * ringR * sinPt;
        float dydt = -Q * r * sinQt * sinPt + P * ringR * cosPt;
        float dzdt = Q * r * cosQt;
        vec3 tangent = normalize(vec3(dxdt, dydt, dzdt));

        // Build perpendicular frame using cross products
        vec3 up = abs(tangent.y) < 0.99 ? vec3(0.0, 1.0, 0.0) : vec3(1.0, 0.0, 0.0);
        vec3 perp1 = normalize(cross(tangent, up));
        vec3 perp2 = cross(tangent, perp1);

        // Oscillation perpendicular to curve using noise
        vec2 seed = uv * 500.0;
        float phase = uFrame * 0.02 + t * 3.0;
        float n1 = smoothNoise(seed + vec2(phase, 0.0)) * 0.06;
        float n2 = smoothNoise(seed + vec2(0.0, phase)) * 0.06;

        // Apply perpendicular oscillation
        x += perp1.x * n1 + perp2.x * n2;
        y += perp1.y * n1 + perp2.y * n2;
        z += perp1.z * n1 + perp2.z * n2;

        gl_FragColor = vec4(x, y, z, t);
      }
    `;

    const posVar = gpuCompute.addVariable('texturePosition', positionShader, posTex0);
    gpuCompute.setVariableDependencies(posVar, [posVar]);

    posVar.material.uniforms.uDt = { value: 0.008 };
    posVar.material.uniforms.uSpeed = { value: 1.0 };
    posVar.material.uniforms.uFrame = { value: 0.0 };

    posVar.wrapS = THREE.RepeatWrapping;
    posVar.wrapT = THREE.RepeatWrapping;

    const err = gpuCompute.init();
    if (err !== null) {
      console.error('GPU Computation init error:', err);
    }

    // =============================================
    // PARTICLE RENDERING (custom shader reads GPU texture)
    // =============================================
    const vertexShader = `
      uniform sampler2D uPositionTexture;
      uniform float uHueShift;
      uniform float uPointSize;
      uniform float uScale;
      attribute vec2 aTexCoord;
      varying vec3 vColor;
      varying float vAlpha;

      vec3 hsl2rgb(float h, float s, float l) {
        float c = (1.0 - abs(2.0 * l - 1.0)) * s;
        float h6 = h * 6.0;
        float x = c * (1.0 - abs(mod(h6, 2.0) - 1.0));
        float m = l - c * 0.5;
        vec3 rgb;
        if (h6 < 1.0) rgb = vec3(c, x, 0.0);
        else if (h6 < 2.0) rgb = vec3(x, c, 0.0);
        else if (h6 < 3.0) rgb = vec3(0.0, c, x);
        else if (h6 < 4.0) rgb = vec3(0.0, x, c);
        else if (h6 < 5.0) rgb = vec3(x, 0.0, c);
        else rgb = vec3(c, 0.0, x);
        return rgb + m;
      }

      void main() {
        vec4 posData = texture2D(uPositionTexture, aTexCoord);
        float x = posData.x;
        float y = posData.y;
        float z = posData.z;
        float t = posData.w;

        vec3 pos = vec3(x, y, z) * uScale;

        // Map hue to t parameter (rainbow along the knot)
        float hue = fract(t / 6.28318530718 + uHueShift);
        float saturation = 0.85;

        // Compute distance from ideal curve for brightness
        float cosQt = cos(7.0 * t);
        float sinQt = sin(7.0 * t);
        float cosPt = cos(3.0 * t);
        float sinPt = sin(3.0 * t);
        float ringR = 2.0 + 0.8 * cosQt;
        vec3 idealPos = vec3(ringR * cosPt, ringR * sinPt, 0.8 * sinQt);
        float dist = length(vec3(x, y, z) - idealPos);

        // Brightness: brighter at center, dimmer at edges of oscillation
        float lightness = 0.1 + 0.15 * (1.0 - clamp(dist / 0.15, 0.0, 1.0));

        vColor = hsl2rgb(hue, saturation, lightness);
        vAlpha = 0.35 + 0.21 * (1.0 - clamp(dist / 0.15, 0.0, 1.0));

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = uPointSize * (50.0 / -mvPosition.z);
        gl_PointSize = max(gl_PointSize, 0.3);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float alpha = (1.0 - d * d) * 0.12;
        gl_FragColor = vec4(vColor, alpha);
      }
    `;

    const geometry = new THREE.BufferGeometry();
    const texCoords = new Float32Array(PARTICLE_COUNT * 2);
    for (let j = 0; j < WIDTH; j++) {
      for (let i = 0; i < WIDTH; i++) {
        const idx = (j * WIDTH + i) * 2;
        texCoords[idx]     = (i + 0.5) / WIDTH;
        texCoords[idx + 1] = (j + 0.5) / WIDTH;
      }
    }
    const dummyPositions = new Float32Array(PARTICLE_COUNT * 3);
    geometry.setAttribute('position', new THREE.BufferAttribute(dummyPositions, 3));
    geometry.setAttribute('aTexCoord', new THREE.BufferAttribute(texCoords, 2));

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uPositionTexture: { value: null },
        uHueShift: { value: 0.0 },
        uPointSize: { value: 1.0 },
        uScale: { value: 2.5 },
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const points = new THREE.Points(geometry, material);
    const pivot = new THREE.Group(); pivot.add(points); scene.add(pivot);

    // =============================================
    // UI
    // =============================================
    document.getElementById('particle-count').textContent =
      `${PARTICLE_COUNT.toLocaleString()} particles — fully GPU computed`;

    const speedSlider = document.getElementById('speed');
    const bloomSlider = document.getElementById('bloom');
    const sizeSlider = document.getElementById('size');
    const hueSlider = document.getElementById('hueShift');
    const fpsEl = document.getElementById('fps');

    document.getElementById('zoomIn').addEventListener('click', () => {
      material.uniforms.uScale.value *= 1.15;
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      material.uniforms.uScale.value *= 0.85;
    });

    // =============================================
    // ANIMATION LOOP (CPU does zero particle work)
    // =============================================
    let lastTime = performance.now();
    let frameCount = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      frameCount++;
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `${frameCount} FPS`;
        frameCount = 0;
        lastTime = now;
      }

      // Update uniforms from UI
      posVar.material.uniforms.uSpeed.value = parseFloat(speedSlider.value);
      posVar.material.uniforms.uFrame.value += 1.0;
      bloomPass.strength = parseFloat(bloomSlider.value);
      material.uniforms.uHueShift.value = parseFloat(hueSlider.value);
      material.uniforms.uPointSize.value = parseFloat(sizeSlider.value);

      // Run GPU computation (torus knot flow on GPU)
      gpuCompute.compute();

      // Pass computed position texture to the render shader
      material.uniforms.uPositionTexture.value =
        gpuCompute.getCurrentRenderTarget(posVar).texture;

      pivot.rotation.x += 0.0008;
      orbitControls.update();
      composer.render();
    }

    animate(performance.now());

    // =============================================
    // RESIZE
    // =============================================
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
