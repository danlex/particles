<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Spiral — Particles</title>
  <meta name="description" content="Four-arm spiral galaxy with differential rotation. Inner stars orbit faster than outer.">
  <meta name="author" content="Alexandru DAN">
  <meta name="theme-color" content="#050505">
  <link rel="canonical" href="https://danlex.github.io/particles/galaxy-spiral.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

  <meta property="og:title" content="Galaxy Spiral — Particles">
  <meta property="og:description" content="Four-arm spiral galaxy with differential rotation. Inner stars orbit faster than outer.">
  <meta property="og:image" content="https://danlex.github.io/particles/og-image.svg">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Galaxy Spiral — Particles">

  <meta name="twitter:image" content="https://danlex.github.io/particles/og-image.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 28px;
      z-index: 10;
      align-items: center;
    }
    .ctrl-group {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .ctrl-group label {
      color: rgba(255,255,255,0.4); font-size: 9px;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .ctrl-group input[type="range"] {
      -webkit-appearance: none; width: 100px; height: 3px;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    #info {
      position: fixed; top: 24px; left: 28px; z-index: 10;
    }
    #info h1 {
      color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 400;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #info p {
      color: rgba(255,255,255,0.25); font-size: 10px;
      margin-top: 6px; letter-spacing: 1px;
    }
    #fps {
      position: fixed; top: 24px; right: 28px;
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 1px; z-index: 10;
    }
    #back {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10;
    }
    #back a {
      color: rgba(255,255,255,0.2); font-size: 9px; text-decoration: none;
      letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.3s;
    }
    #back a:hover { color: rgba(255,255,255,0.5); }
      .zoom-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      font-family: monospace;
    }
    .zoom-btn:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div id="info">
    <h1>Galaxy Spiral</h1>
    <p id="particle-count"></p>
  </div>
  <div id="fps"></div>
  <div id="back"><a href="index.html">Gallery</a></div>
  <div id="controls">
    <div class="ctrl-group">
      <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
      <label>Speed</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="bloom" min="0" max="3" step="0.1" value="0.5">
      <label>Bloom</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="size" min="0.5" max="4" step="0.1" value="1.0">
      <label>Size</label>
    </div>
    <div class="ctrl-group">
      <input type="range" id="hueShift" min="0" max="1" step="0.01" value="0">
      <label>Hue</label>
    </div>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn" id="zoomIn">+</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

    // =============================================
    // CONFIG
    // =============================================
    // Texture size: WIDTH x WIDTH = total particles
    const WIDTH = 256; // 256x256 = 65,536 particles
    const PARTICLE_COUNT = WIDTH * WIDTH;

    // =============================================
    // SCENE
    // =============================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(1); // Force 1x for performance; bloom is the bottleneck at 2x
    document.body.appendChild(renderer.domElement);

    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.05;
    orbitControls.autoRotate = true;
    orbitControls.autoRotateSpeed = 0.5;

    // =============================================
    // POST-PROCESSING
    // =============================================
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // Half-resolution bloom for performance
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(innerWidth / 2, innerHeight / 2),
      0.4,  // strength (low to avoid blowout)
      0.3,  // radius
      0.8   // threshold (high — only bright edges bloom)
    );
    composer.addPass(bloomPass);

    // =============================================
    // GPU COMPUTATION (Galaxy Spiral on GPU)
    // =============================================
    const gpuCompute = new GPUComputationRenderer(WIDTH, WIDTH, renderer);

    // Position texture: stores (arm_angle, radius, height, index/N) per particle
    const posTex0 = gpuCompute.createTexture();

    // Seed particles into a spiral galaxy structure
    function initSeedData(tex) {
      const data = tex.image.data; // Float32Array, 4 values per pixel (RGBA)
      const NUM_ARMS = 4;

      // Simple pseudo-random based on index for gaussian-like height distribution
      function pseudoRandom(seed) {
        let x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
        return x - Math.floor(x);
      }

      // Box-Muller-like approximation using sum of randoms
      function gaussianLike(seed) {
        let sum = 0;
        for (let k = 0; k < 6; k++) {
          sum += pseudoRandom(seed + k * 73.13);
        }
        return (sum / 6.0 - 0.5) * 2.0; // roughly gaussian, range ~ [-1, 1]
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const t = i / PARTICLE_COUNT; // normalized index [0, 1)
        const armId = i % NUM_ARMS;
        const armOffset = armId * (Math.PI / 2.0); // PI/2 spacing for 4 arms

        const armAngle = t * 2.0 * Math.PI * 3.0 + armOffset;
        const radius = Math.sqrt(t) * 8.0;
        const height = gaussianLike(i * 1.7) * 0.3 / (1.0 + radius * 0.5);

        const idx = i * 4;
        data[idx]     = armAngle;          // arm_angle
        data[idx + 1] = radius;            // radius
        data[idx + 2] = height;            // height (y)
        data[idx + 3] = t;                 // particle_index / N
      }
    }

    initSeedData(posTex0);

    // GPU shader: Galaxy spiral animation computed entirely on GPU
    const positionShader = `
      uniform float uTime;
      uniform float uSpeed;
      uniform sampler2D uSeedTexture;

      // Simple GPU-friendly hash noise
      float hash(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 seed = texture2D(uSeedTexture, uv);

        float armAngle = seed.x;
        float radius = seed.y;
        float height = seed.z;
        float particleIndex = seed.w;

        // Animate time with speed multiplier
        float t = uTime * uSpeed;

        // Differential rotation: inner particles spin faster
        float angle = armAngle + t * 0.1 / (1.0 + radius * 0.3);

        // Convert polar to Cartesian
        float x = radius * cos(angle);
        float y = height;
        float z = radius * sin(angle);

        // Add subtle noise wobble
        float wobbleX = (hash(uv * 100.0 + t * 0.3) - 0.5) * 0.08;
        float wobbleY = (hash(uv * 200.0 + t * 0.2) - 0.5) * 0.04;
        float wobbleZ = (hash(uv * 300.0 + t * 0.25) - 0.5) * 0.08;

        x += wobbleX;
        y += wobbleY;
        z += wobbleZ;

        gl_FragColor = vec4(x, y, z, radius);
      }
    `;

    // =============================================
    // SEED TEXTURE (read-only, for compute + vertex shaders)
    // =============================================
    // Copy the seed data so it persists unchanged
    const seedData = new Float32Array(posTex0.image.data);
    const seedTexture = new THREE.DataTexture(
      seedData,
      WIDTH,
      WIDTH,
      THREE.RGBAFormat,
      THREE.FloatType
    );
    seedTexture.needsUpdate = true;

    const posVar = gpuCompute.addVariable('texturePosition', positionShader, posTex0);
    gpuCompute.setVariableDependencies(posVar, [posVar]);

    posVar.material.uniforms.uTime = { value: 0.0 };
    posVar.material.uniforms.uSpeed = { value: 1.0 };
    posVar.material.uniforms.uSeedTexture = { value: seedTexture };

    // Wrap mode for the texture
    posVar.wrapS = THREE.RepeatWrapping;
    posVar.wrapT = THREE.RepeatWrapping;

    const err = gpuCompute.init();
    if (err !== null) {
      console.error('GPU Computation init error:', err);
    }

    // =============================================
    // PARTICLE RENDERING (custom shader reads GPU texture)
    // =============================================
    const vertexShader = `
      uniform vec3 uMouseWorld;
      uniform float uMouseStrength;
      uniform sampler2D uPositionTexture;
      uniform sampler2D uSeedTexture;
      uniform float uHueShift;
      uniform float uPointSize;
      attribute vec2 aTexCoord;
      varying vec3 vColor;

      vec3 hsl2rgb(float h, float s, float l) {
        float c = (1.0 - abs(2.0 * l - 1.0)) * s;
        float h6 = h * 6.0;
        float x = c * (1.0 - abs(mod(h6, 2.0) - 1.0));
        float m = l - c * 0.5;
        vec3 rgb;
        if (h6 < 1.0) rgb = vec3(c, x, 0.0);
        else if (h6 < 2.0) rgb = vec3(x, c, 0.0);
        else if (h6 < 3.0) rgb = vec3(0.0, c, x);
        else if (h6 < 4.0) rgb = vec3(0.0, x, c);
        else if (h6 < 5.0) rgb = vec3(x, 0.0, c);
        else rgb = vec3(c, 0.0, x);
        return rgb + m;
      }

      void main() {
        vec4 posData = texture2D(uPositionTexture, aTexCoord);
        vec4 seedVal = texture2D(uSeedTexture, aTexCoord);

        float x = posData.x;
        float y = posData.y;
        float z = posData.z;
        float radius = posData.w;

        float height = seedVal.z;

        vec3 pos = vec3(x, y, z);
        // Mouse displacement
        vec3 toM = uMouseWorld - pos;
        float mDist = length(toM);
        pos += toM * uMouseStrength * 0.5 / (mDist * mDist + 2.0);

        // Color: hue from radius (warm yellow/white center -> blue outer arms)
        // Center (radius~0): hue ~0.12 (warm yellow), outer (radius~8): hue ~0.6 (blue)
        float hue = fract(mix(0.12, 0.6, clamp(radius / 8.0, 0.0, 1.0)) + uHueShift);
        float saturation = 0.6;
        // Lightness from proximity to disk plane + radius-based brightness
        float diskProximity = exp(-abs(height) * 5.0);
        float lightness = (0.15 + 0.2 * exp(-radius * 0.3)) * diskProximity;

        vColor = hsl2rgb(hue, saturation, lightness);

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = uPointSize * (80.0 / -mvPosition.z);
        gl_PointSize = max(gl_PointSize, 0.3);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        // Soft gaussian falloff with bright core
        float glow = exp(-d * d * 3.0);
        float core = exp(-d * d * 12.0);
        float alpha = (glow * 0.15 + core * 0.3);
        // Slight color boost at core (hotter center)
        vec3 col = vColor + core * 0.15;
        gl_FragColor = vec4(col, alpha);
      }
    `;

    // Create geometry with texture coordinates to look up GPU results
    const geometry = new THREE.BufferGeometry();
    const texCoords = new Float32Array(PARTICLE_COUNT * 2);
    for (let j = 0; j < WIDTH; j++) {
      for (let i = 0; i < WIDTH; i++) {
        const idx = (j * WIDTH + i) * 2;
        texCoords[idx]     = (i + 0.5) / WIDTH;
        texCoords[idx + 1] = (j + 0.5) / WIDTH;
      }
    }
    // Dummy positions (will be overridden by vertex shader)
    const dummyPositions = new Float32Array(PARTICLE_COUNT * 3);
    geometry.setAttribute('position', new THREE.BufferAttribute(dummyPositions, 3));
    geometry.setAttribute('aTexCoord', new THREE.BufferAttribute(texCoords, 2));

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uMouseWorld: { value: new THREE.Vector3(0, 0, -1000) },
        uMouseStrength: { value: 0.0 },
        uPositionTexture: { value: null },
        uSeedTexture: { value: seedTexture },
        uHueShift: { value: 0.0 },
        uPointSize: { value: 1.0 },
      },
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const points = new THREE.Points(geometry, material);
    const pivot = new THREE.Group(); pivot.add(points); scene.add(pivot);

    // =============================================
    // UI
    // =============================================
    document.getElementById('particle-count').textContent =
      `${PARTICLE_COUNT.toLocaleString()} particles — fully GPU computed`;

    const speedSlider = document.getElementById('speed');
    const bloomSlider = document.getElementById('bloom');
    const sizeSlider = document.getElementById('size');
    const hueSlider = document.getElementById('hueShift');
    const fpsEl = document.getElementById('fps');

    document.getElementById('zoomIn').addEventListener('click', () => {
      material.uniforms.uScale.value *= 1.15;
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      material.uniforms.uScale.value *= 0.85;
    });

    // =============================================
    // Mouse interaction
    const mouse = new THREE.Vector2();
    const mouse3D = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    let mouseActive = false;

    renderer.domElement.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      mouseActive = true;
      raycaster.setFromCamera(mouse, camera);
      mouse3D.copy(raycaster.ray.direction).multiplyScalar(15).add(camera.position);
    });
    renderer.domElement.addEventListener('mouseleave', () => { mouseActive = false; });

    // ANIMATION LOOP (CPU does zero particle work)
    // =============================================
    let lastTime = performance.now();
    let frameCount = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      frameCount++;
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `${frameCount} FPS`;
        frameCount = 0;
        lastTime = now;
      }

      // Update uniforms from UI
      posVar.material.uniforms.uSpeed.value = parseFloat(speedSlider.value);
      posVar.material.uniforms.uTime.value = now * 0.001; // seconds
      bloomPass.strength = parseFloat(bloomSlider.value);
      material.uniforms.uHueShift.value = parseFloat(hueSlider.value);
      material.uniforms.uPointSize.value = parseFloat(sizeSlider.value);

      // Update mouse uniforms
      if (mouseActive) {
        material.uniforms.uMouseWorld.value.copy(mouse3D);
        material.uniforms.uMouseStrength.value = 1.0;
      } else {
        material.uniforms.uMouseStrength.value *= 0.95;
      }


      // Run GPU computation (Galaxy spiral on GPU)
      gpuCompute.compute();

      // Pass computed position texture to the render shader
      material.uniforms.uPositionTexture.value =
        gpuCompute.getCurrentRenderTarget(posVar).texture;

      pivot.rotation.x += 0.0008;
      orbitControls.update();
      composer.render();
    }

    animate(performance.now());

    // =============================================
    // RESIZE
    // =============================================
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
  <script src="shared-ui.js"></script>
</body>
</html>
